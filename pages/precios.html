<body>

    <header>
        <button id="btnCarrito" class="btn btn-warning position-fixed top-0 end-0 m-3" style="z-index:1050;">
            🛒 Ver carrito (<span id="cantidad">0</span>)
        </button>
    </header>

    <main class="container mt-5 pt-5">

        <h1 class="text-center text-white mb-5">
            Nuestras Actividades
        </h1>

        <div id="cards" class="row g-4"></div>

        <!-- Carrito -->
        <div id="carrito" class="card p-3 mt-5" style="display:none;">

            <h3>Mi carrito</h3>

            <ul id="lista-carrito" class="list-group mb-3"></ul>

            <h4>Total: $<span id="total">0</span></h4>

            <div class="d-flex gap-2">

                <button id="vaciar" class="btn btn-danger">
                    Vaciar
                </button>

                <button id="confirmar" class="btn btn-success">
                    Continuar inscripción
                </button>

            </div>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="../css/precios.css">

    <script src="../js/precios.js"></script>

</body>
