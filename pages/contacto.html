<!DOCTYPE html>
<html lang="ES-es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Saqqara Gym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/contacto.css">
</head>

<body>

    <header></header>

    <main class="container d-flex align-items-center justify-content-center min-vh-100 pt-5">
        
        <div class="tarjeta-contacto text-center p-5 rounded border border-warning shadow-lg">
            
            <h1 class="mb-4">Contacto</h1>
            <p class="text-muted mb-5">¿Tenés dudas? Hablanos por cualquiera de nuestros canales:</p>

            <div class="info-items text-start mx-auto" style="max-width: 380px;">
                <div class="info-item mb-4 d-flex align-items-center">
                    <span class="icono-contacto me-3">📍</span>
                    <div>
                        <h5 class="m-0 text-warning">Dirección</h5>
                        <p class="m-0 text-white">Av. General Paz 1234, Buenos Aires</p>
                    </div>
                </div>

                <a href="https://wa.me/5491123456789" target="_blank" class="info-item mb-4 d-flex align-items-center text-decoration-none">
                    <span class="icono-contacto me-3">💬</span>
                    <div>
                        <h5 class="m-0 text-warning">WhatsApp</h5>
                        <p class="m-0 text-white">11-2345-6789 (Escribinos directo)</p>
                    </div>
                </a>

                <div class="info-item mb-4 d-flex align-items-center">
                    <span class="icono-contacto me-3">📞</span>
                    <div>
                        <h5 class="m-0 text-warning">Teléfono Fijo</h5>
                        <p class="m-0 text-white">4567-8910</p>
                    </div>
                </div>

                <a href="https://instagram.com" target="_blank" class="info-item mb-5 d-flex align-items-center text-decoration-none">
                    <span class="icono-contacto me-3">📸</span>
                    <div>
                        <h5 class="m-0 text-warning">Instagram</h5>
                        <p class="m-0 text-white">@saqqara.gym</p>
                    </div>
                </a>
            </div>

            <button type="button" class="btn-volver w-100" onclick="window.location.href='../index.html'">
                Volver a la página principal
            </button>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/contacto.js"></script>

</body>
</html>
