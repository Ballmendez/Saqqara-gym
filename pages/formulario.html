<!DOCTYPE html>
<html lang="ES-es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripcion</title>
</head>

<body>
    <form id="formulario" class="formulario" action="#" method="POST">

        <h2>Formulario de inscripción</h2>

        <label for="nombre">Nombre y apellido</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre completo" required>

        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" name="telefono" placeholder="Ej: 1123456789" required>

        <label for="mail">Correo electrónico</label>
        <input type="email" id="mail" name="mail" placeholder="ejemplo@gmail.com" required>

        <label for="edad">Edad</label>
<input type="number" id="edad" class="form-control" required placeholder="Tu edad">

        <label>Actividades a realizar</label>
        <div id="actividades-seleccionadas" class="p-3 mb-3 bg-dark text-white rounded border border-warning">
            <p class="text-muted m-0">No hay actividades seleccionadas.</p>
        </div>

        <label for="horario">Horario preferido</label>
        <select id="horario" name="horario">
            <option value="">Seleccione un horario</option>
            <option value="mañana">Mañana</option>
            <option value="tarde">Tarde</option>
            <option value="noche">Noche</option>
        </select>

        <label for="mensaje">Mensaje adicional</label>
        <textarea id="mensaje" name="mensaje" placeholder="Escriba alguna consulta..."></textarea>

        <button type="submit">Enviar formulario</button>
        <button type="reset">Limpiar formulario</button>
        <button type="button" onclick="window.location.href='../index.html'">Volver a la página principal</button>

    </form>
</body>
<script src="../js/formulario.js"></script>
<link rel="stylesheet" href="../css/formulario.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</html>
